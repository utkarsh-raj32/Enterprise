services:
  - type: web
    name: enterprise-hrm-api
    env: docker
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      # Activate default profile (or docker profile if you want)
      - key: SPRING_PROFILES_ACTIVE
        value: default
      
      # Database connection details (to be filled in Render Dashboard)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      
      # Auto-generate a secure 64-character hex string for JWT
      - key: JWT_SECRET
        generateValue: true

      # Tuning JVM for Render's Free Tier (512MB RAM limit)
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx256m -XX:+UseG1GC"
