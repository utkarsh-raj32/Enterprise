# ============================================================
# DOCKER PROFILE CONFIGURATION
# Activated via: SPRING_PROFILES_ACTIVE=docker
# Overrides values from application.yml for containerised env
# ============================================================

spring:
  datasource:
    # 'mysql' refers to the service name in docker-compose.yml
    # Docker's internal DNS resolves service names to container IPs
    url: jdbc:mysql://mysql:3306/enterprise_hrm?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

    # These come from environment variables set in docker-compose.yml
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}

  jpa:
    # In Docker we still use update — change to 'none' and use
    # Flyway migrations for true production containers
    hibernate:
      ddl-auto: update

logging:
  level:
    root: INFO
    com.enterprise.hrm: INFO
    org.springframework.security: INFO
